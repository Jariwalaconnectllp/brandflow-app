<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>BrandFlow — Branding Process Management</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f1a;--bg2:#13162a;--bgc:#181c35;--bgh:#1e2340;
  --border:rgba(255,255,255,0.08);--borderl:rgba(255,255,255,0.15);
  --txt:#f0f2ff;--txt2:#8890b5;--txt3:#5a6080;
  --acc:#e8c547;--accd:rgba(232,197,71,0.15);--acch:#f0d060;
  --blu:#4f8ef7;--blud:rgba(79,142,247,0.15);
  --grn:#3ecf8e;--grnd:rgba(62,207,142,0.12);
  --red:#f56565;--redd:rgba(245,101,101,0.12);
  --org:#f6ad55;--orgd:rgba(246,173,85,0.12);
  --pur:#b794f4;--purd:rgba(183,148,244,0.12);
  --tel:#4fd1c5;--teld:rgba(79,209,197,0.12);
  --r:8px;--rl:14px;
}
html,body{height:100%;font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--txt);font-size:14px;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--borderl);border-radius:3px}

/* ════ LOGIN ════ */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;position:relative;overflow:hidden}
.login-glow{position:absolute;inset:0;pointer-events:none}
.login-glow::before{content:'';position:absolute;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(232,197,71,.07),transparent 65%);top:-300px;left:-200px}
.login-glow::after{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(79,142,247,.06),transparent 65%);bottom:-300px;right:-200px}
.login-card{position:relative;z-index:1;background:var(--bgc);border:1px solid var(--borderl);border-radius:24px;padding:44px 40px;width:100%;max-width:440px;box-shadow:0 24px 80px rgba(0,0,0,.5)}
.login-logo{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:28px}
.login-logo-icon{width:44px;height:44px;background:var(--acc);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px}
.login-logo-text{font-size:24px;font-weight:700;letter-spacing:-0.04em}
.login-title{font-size:22px;font-weight:700;text-align:center;margin-bottom:6px;letter-spacing:-0.02em}
.login-sub{font-size:14px;color:var(--txt2);text-align:center;margin-bottom:32px}
.login-form{display:flex;flex-direction:column;gap:16px}
.fld label{display:block;font-size:12px;font-weight:600;color:var(--txt2);margin-bottom:5px;letter-spacing:.02em}
.fld input,.fld select,.fld textarea{width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--txt);border-radius:var(--r);padding:11px 14px;font-size:14px;outline:none;font-family:inherit;transition:border-color .18s}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--accd)}
.fld input::placeholder,.fld textarea::placeholder{color:var(--txt3)}
.pass-wrap{position:relative}
.pass-wrap input{padding-right:44px}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--txt3);cursor:pointer;font-size:16px;padding:4px}
.eye-btn:hover{color:var(--txt)}
.login-btn{background:var(--acc);color:#0d0f1a;font-weight:700;font-size:15px;padding:13px;border-radius:var(--r);border:none;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;transition:all .2s;margin-top:4px}
.login-btn:hover{background:var(--acch);transform:translateY(-1px);box-shadow:0 6px 20px rgba(232,197,71,.3)}
.login-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.login-error{background:var(--redd);border:1px solid rgba(245,101,101,.3);color:var(--red);border-radius:var(--r);padding:10px 14px;font-size:13px;text-align:center}
.demo-section{margin-top:24px;padding-top:20px;border-top:1px solid var(--border)}
.demo-label{font-size:11px;font-weight:700;color:var(--txt3);text-align:center;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.demo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.demo-btn{padding:9px 10px;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg2);color:var(--txt2);font-family:inherit;transition:all .15s;text-align:center}
.demo-btn:hover{background:var(--bgc);border-color:var(--borderl);color:var(--txt)}
.demo-hint{text-align:center;font-size:11px;color:var(--txt3)}
.demo-hint code{background:var(--bg2);padding:1px 6px;border-radius:4px;font-family:'Space Mono',monospace;color:var(--acc)}

/* ════ APP SHELL ════ */
#app-screen{display:none;flex:1;height:100vh;overflow:hidden}
#app-screen.visible{display:flex}
.app{display:flex;height:100vh;overflow:hidden;width:100%}
.sidebar{width:224px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width .25s}
.sidebar.collapsed{width:60px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;gap:12px}
.content{flex:1;overflow-y:auto;padding:24px;background:var(--bg)}
.logo{display:flex;align-items:center;gap:10px;padding:18px 14px;border-bottom:1px solid var(--border)}
.logo-icon{width:32px;height:32px;background:var(--acc);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.logo-text{font-size:17px;font-weight:700;letter-spacing:-0.03em;white-space:nowrap}
.user-chip{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border)}
.ava{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.user-meta{display:flex;flex-direction:column;overflow:hidden}
.u-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.u-role{font-size:11px;font-weight:500}
nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.nav-i{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:var(--r);color:var(--txt2);cursor:pointer;transition:all .15s;font-size:13px;font-weight:500;white-space:nowrap}
.nav-i:hover{background:var(--bgc);color:var(--txt)}
.nav-i.active{background:var(--accd);color:var(--acc)}
.nav-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0;position:relative}
.nav-lbl{flex:1}
.notif-pip{position:absolute;top:-4px;right:-5px;width:15px;height:15px;background:var(--red);border-radius:8px;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;color:#fff}
.sidebar-bottom{padding:10px 8px;border-top:1px solid var(--border)}
.logout-btn{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:var(--r);color:var(--txt2);cursor:pointer;font-size:13px;font-weight:500;background:none;border:none;font-family:inherit;width:100%;transition:all .15s}
.logout-btn:hover{background:var(--redd);color:var(--red)}
.menu-btn{background:transparent;color:var(--txt2);border:none;padding:6px;border-radius:var(--r);cursor:pointer;font-size:18px;line-height:1}
.menu-btn:hover{background:var(--bgc);color:var(--txt)}
.page-title{font-size:16px;font-weight:600}
.role-tag{font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;letter-spacing:.04em}

/* ════ SHARED COMPONENTS ════ */
.card{background:var(--bgc);border:1px solid var(--border);border-radius:var(--rl);padding:20px}
.card-s{background:var(--bgc);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi{background:var(--bgc);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.kpi-top{display:flex;justify-content:space-between;align-items:flex-start}
.kpi-label{font-size:12px;color:var(--txt2);margin-bottom:8px}
.kpi-val{font-size:28px;font-weight:700;letter-spacing:-0.03em}
.kpi-ico{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
.tag{font-size:11px;padding:3px 9px;border-radius:6px;background:var(--bg2);color:var(--txt2)}
.tbl-wrap{border-radius:var(--r);border:1px solid var(--border);overflow:hidden}
table{width:100%;border-collapse:collapse}
thead{background:var(--bg2)}
th{padding:11px 15px;text-align:left;font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:13px 15px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.clickable:hover td{background:rgba(255,255,255,.025);cursor:pointer}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:var(--r);font-size:13px;font-weight:600;border:none;transition:all .18s;white-space:nowrap;font-family:inherit;cursor:pointer}
.btn-p{background:var(--acc);color:#0d0f1a}.btn-p:hover{background:var(--acch);transform:translateY(-1px);box-shadow:0 4px 14px rgba(232,197,71,.25)}
.btn-s{background:var(--bgc);color:var(--txt);border:1px solid var(--border)}.btn-s:hover{background:var(--bgh);border-color:var(--borderl)}
.btn-ok{background:var(--grnd);color:var(--grn);border:1px solid rgba(62,207,142,.25)}.btn-ok:hover{background:rgba(62,207,142,.2)}
.btn-err{background:var(--redd);color:var(--red);border:1px solid rgba(245,101,101,.25)}.btn-err:hover{background:rgba(245,101,101,.2)}
.btn-sm{padding:6px 11px;font-size:12px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px}
.fld{margin-bottom:13px}
.fld select option{background:var(--bgc)}
.sec{font-size:13px;font-weight:700;color:var(--txt);margin-bottom:13px;display:flex;align-items:center;gap:7px}
.divider{height:1px;background:var(--border);margin:14px 0}
.mono{font-family:'Space Mono',monospace;font-size:11px}
.empty{text-align:center;padding:60px 20px;color:var(--txt3)}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--txt2);background:none;border:none;cursor:pointer;padding:4px;margin-bottom:14px;transition:color .15s;font-family:inherit}
.back-btn:hover{color:var(--acc)}
.ph-title{font-size:22px;font-weight:700;letter-spacing:-0.03em}
.ph-sub{font-size:13px;color:var(--txt2);margin-top:3px}
.page-header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:20px}
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.search-wrap{position:relative;display:flex;align-items:center;flex:1;min-width:200px}
.search-ico{position:absolute;left:12px;color:var(--txt3);font-size:14px;pointer-events:none}
.search-inp{padding-left:36px!important;background:var(--bgc)!important;border:1px solid var(--border)!important}
.search-inp:focus{border-color:var(--acc)!important}

/* Workflow */
.wf{display:flex;align-items:flex-start;overflow-x:auto;padding:4px 0 10px;gap:0}
.wf-step{display:flex;flex-direction:column;align-items:center;gap:5px;min-width:80px;opacity:.35;transition:opacity .2s;text-align:center}
.wf-step.done,.wf-step.active{opacity:1}
.wf-circle{width:30px;height:30px;border-radius:50%;border:2px solid var(--borderl);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:var(--bgc);color:var(--txt2)}
.wf-step.done .wf-circle{background:var(--grnd);border-color:var(--grn);color:var(--grn)}
.wf-step.active .wf-circle{background:var(--accd);border-color:var(--acc);color:var(--acc);box-shadow:0 0 12px var(--accd)}
.wf-lbl{font-size:9px;font-weight:600;color:var(--txt2);line-height:1.3}
.wf-step.active .wf-lbl{color:var(--acc)}.wf-step.done .wf-lbl{color:var(--grn)}
.wf-role{font-size:8px;color:var(--txt3)}
.wf-line{width:36px;height:2px;background:var(--border);flex-shrink:0;margin-bottom:24px}
.wf-line.done{background:var(--grn)}

/* Timeline */
.timeline{display:flex;flex-direction:column}
.tl{display:flex;gap:10px;padding-bottom:13px;position:relative}
.tl::before{content:'';position:absolute;left:4px;top:14px;bottom:0;width:1px;background:var(--border)}
.tl:last-child::before{display:none}
.tl-dot{width:9px;height:9px;border-radius:50%;background:var(--acc);flex-shrink:0;margin-top:3px;box-shadow:0 0 6px var(--accd)}
.tl-body{flex:1}
.tl-act{font-size:12px;font-weight:500}
.tl-meta{font-size:11px;color:var(--txt3);margin-top:2px}

/* Detail layout */
.detail-layout{display:grid;grid-template-columns:1fr 280px;gap:16px;align-items:start}
.detail-main{display:flex;flex-direction:column;gap:14px}
.detail-side{display:flex;flex-direction:column;gap:14px;position:sticky;top:0}
.d-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.d-row label{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;font-weight:700;margin-bottom:3px;display:block}
.d-row p{font-size:13px;color:var(--txt)}
.action-panel{background:var(--bg2);border:1px solid rgba(232,197,71,.22);border-radius:var(--rl);padding:18px}
.action-title{font-size:14px;font-weight:700;color:var(--acc);margin-bottom:14px;display:flex;align-items:center;gap:7px}
.assign-row{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid var(--border)}
.assign-row:last-child{border-bottom:none}
.assign-ava{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.sla-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)}
.sla-row:last-child{border-bottom:none}
.sla-label{font-size:12px;color:var(--txt2)}
.sla-date{font-size:11px;color:var(--txt3);font-family:'Space Mono',monospace}
.dec-btns{display:flex;gap:10px;margin-bottom:14px}
.dec-btn{flex:1;justify-content:center;padding:11px;border-radius:var(--r);font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px;border:2px solid var(--border);background:var(--bg2);color:var(--txt2);cursor:pointer;transition:all .15s;font-family:inherit}
.dec-btn.approve{border-color:var(--grn);background:var(--grnd);color:var(--grn)}
.dec-btn.reject{border-color:var(--red);background:var(--redd);color:var(--red)}
.upload-zone{border:2px dashed var(--border);border-radius:var(--r);padding:22px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:12px}
.upload-zone:hover{border-color:var(--acc);background:var(--accd)}
.img-ph{width:70px;height:70px;border-radius:var(--r);background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;transition:all .15s}
.img-ph:hover{border-color:var(--acc);transform:scale(1.05)}

/* Notifications */
.notif-item{display:flex;align-items:flex-start;gap:11px;padding:13px 14px;border-radius:var(--r);border:1px solid transparent;margin-bottom:4px;cursor:pointer;transition:all .15s}
.notif-item:hover{border-color:var(--border)}
.notif-item.unread{background:rgba(232,197,71,.04);border-color:rgba(232,197,71,.1)}
.ndot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:4px}
.n-title{font-size:13px;font-weight:600;margin-bottom:3px}
.n-msg{font-size:12px;color:var(--txt2);line-height:1.4}
.n-time{font-size:11px;color:var(--txt3);margin-top:5px}
.unread-pip{width:7px;height:7px;border-radius:50%;background:var(--acc);flex-shrink:0;box-shadow:0 0 6px var(--accd);margin-top:4px}

/* Team cards */
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}
.team-card{background:var(--bgc);border:1px solid var(--border);border-radius:var(--rl);padding:22px;text-align:center;position:relative}
.team-card:hover{border-color:var(--borderl)}
.team-ava{width:52px;height:52px;border-radius:50%;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700}
.team-actions{display:flex;gap:6px;justify-content:center;margin-top:10px}

/* Admin modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px;backdrop-filter:blur(4px)}
.modal{background:var(--bgc);border:1px solid var(--borderl);border-radius:var(--rl);padding:28px;width:100%;max-width:500px;box-shadow:0 24px 80px rgba(0,0,0,.6);animation:modalIn .22s ease}
@keyframes modalIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
.modal-title{font-size:17px;font-weight:700;margin-bottom:4px;letter-spacing:-0.02em}
.modal-sub{font-size:13px;color:var(--txt2);margin-bottom:22px}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.role-pill{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:2px solid transparent;transition:all .15s}
.role-pills{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}

/* Status bar */
.stat-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px}
.stat-chip{border-radius:var(--r);padding:10px 14px;text-align:center}
.stat-num{font-size:20px;font-weight:700;line-height:1}
.stat-lbl{font-size:10px;margin-top:3px;opacity:.85}

/* Req cell */
.req-cell{display:flex;flex-direction:column;gap:2px}
.req-title{font-size:13px;font-weight:500;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Toast */
#toasts{position:fixed;top:16px;right:16px;display:flex;flex-direction:column;gap:8px;z-index:9999}
.toast{background:var(--bgc);border:1px solid var(--borderl);border-radius:var(--r);padding:11px 16px;font-size:13px;font-weight:500;animation:toastIn .22s ease;max-width:300px;box-shadow:0 4px 20px rgba(0,0,0,.4)}
@keyframes toastIn{from{transform:translateX(20px);opacity:0}to{transform:none;opacity:1}}

/* Spinner */
.spin{width:18px;height:18px;border:2px solid rgba(255,255,255,.2);border-top-color:currentColor;border-radius:50%;animation:spinning .6s linear infinite}
@keyframes spinning{to{transform:rotate(360deg)}}

@media(max-width:900px){
  .sidebar{width:56px}.logo-text,.user-meta,.nav-lbl,.sidebar-bottom span{display:none}
  .kpi-grid{grid-template-columns:1fr 1fr}
  .detail-layout{grid-template-columns:1fr}
  .d-grid,.grid-2,.grid-3{grid-template-columns:1fr}
}
@media(max-width:600px){.content{padding:14px}.login-card{padding:28px 22px}}
</style>
</head>
<body>

<!-- ══════════════════ LOGIN SCREEN ══════════════════ -->
<div id="login-screen">
  <div class="login-glow"></div>
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">⚡</div>
      <span class="login-logo-text">BrandFlow</span>
    </div>
    <div class="login-title">Welcome back</div>
    <div class="login-sub">Sign in to manage branding requests</div>

    <div class="login-form">
      <div class="fld">
        <label>Email Address</label>
        <input id="login-email" type="email" placeholder="you@company.com" autocomplete="email"
          onkeydown="if(event.key==='Enter')document.getElementById('login-pass').focus()"/>
      </div>
      <div class="fld">
        <label>Password</label>
        <div class="pass-wrap">
          <input id="login-pass" type="password" placeholder="••••••••" autocomplete="current-password"
            onkeydown="if(event.key==='Enter')doLogin()"/>
          <button class="eye-btn" onclick="togglePass()" id="eye-icon">👁</button>
        </div>
      </div>
      <div id="login-err" style="display:none" class="login-error"></div>
      <button class="login-btn" id="login-btn" onclick="doLogin()">
        <span id="login-btn-text">Sign In →</span>
      </button>

function showToast(msg, type='success') {
  const colors = { success:'var(--grn)', error:'var(--red)', info:'var(--acc)' };
  const icons  = { success:'✅', error:'❌', info:'ℹ️' };
  const el = document.createElement('div');
  el.className = 'toast';
  el.style.borderLeft = `3px solid ${colors[type]}`;
  el.innerHTML = `${icons[type]} ${msg}`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translateX(20px)'; el.style.transition='all .22s'; setTimeout(()=>el.remove(),220); }, 3000);
}

function togglePass() {
  const inp = document.getElementById('login-pass');
  const eye = document.getElementById('eye-icon');
  if(inp.type==='password'){ inp.type='text'; eye.textContent='🙈'; }
  else { inp.type='password'; eye.textContent='👁'; }
}

function quickLogin(email, label) {
  document.getElementById('login-email').value = email;
  document.getElementById('login-pass').value = 'password123';
  setTimeout(doLogin, 100);
}

function doLogin() {
  const email = document.getElementById('login-email').value.trim().toLowerCase();
  const pass  = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-err');
  const btnEl = document.getElementById('login-btn');
  const txtEl = document.getElementById('login-btn-text');

  errEl.style.display='none';
  btnEl.disabled=true;
  txtEl.innerHTML='<div class="spin"></div> Signing in…';

  setTimeout(() => {
    const user = USERS_DB.find(u => u.email===email && u.password===pass);
    if(!user) {
      errEl.textContent = '❌ Invalid email or password. Please try again.';
      errEl.style.display='block';
      btnEl.disabled=false;
      txtEl.textContent='Sign In →';
      return;
    }
    if(!user.active) {
      errEl.textContent = '⛔ Your account has been deactivated. Contact the Admin.';
      errEl.style.display='block';
      btnEl.disabled=false;
      txtEl.textContent='Sign In →';
      return;
    }
    // SUCCESS
    S.loggedIn = true;
    S.currentUser = user;
    S.page = 'dashboard';
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app-screen').classList.add('visible');
    renderSidebar();
    renderContent();
    showToast(`Welcome back, ${user.name.split(' ')[0]}! 👋`);
  }, 600);
}

function doLogout() {
  S.loggedIn=false; S.currentUser=null; S.page='dashboard'; S.selReq=null;
  document.getElementById('app-screen').classList.remove('visible');
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('login-email').value='';
  document.getElementById('login-pass').value='';
  document.getElementById('login-err').style.display='none';
  document.getElementById('login-btn').disabled=false;
  document.getElementById('login-btn-text').textContent='Sign In →';
}

/* ══════════════════════════ REQUESTS LIST ══════════════════════ */
function renderRequests() {
  const u=cu(), f=S.filterVals;
  let reqs = getMyRequests().filter(r=>{
    if(f.search && !r.id.toLowerCase().includes(f.search.toLowerCase()) && !r.title.toLowerCase().includes(f.search.toLowerCase()) && !r.city.toLowerCase().includes(f.search.toLowerCase())) return false;
    if(f.status && r.status!==f.status) return false;
    if(f.city && !r.city.toLowerCase().includes(f.city.toLowerCase())) return false;
    if(f.priority && r.priority!==f.priority) return false;
    return true;
  });
  const hasF = Object.values(f).some(Boolean);

  const rows = reqs.map(r=>`
    <tr class="clickable" onclick="nav('detail','${r.id}')">
      <td><span class="mono" style="color:var(--acc)">${r.id}</span></td>
      <td><div class="req-cell"><div class="req-title">${r.title}</div><div style="font-size:11px;color:var(--txt3)">by ${uname(r.createdById)}</div></div></td>
      <td style="color:var(--txt2);font-size:12px">📍 ${r.city}, ${r.state}</td>
      <td><span class="tag">${r.type}</span></td>
      <td>${pbadge(r.priority)}</td>
      <td>${sbadge(r.status)}</td>
      <td><button class="btn btn-s btn-sm" onclick="event.stopPropagation();nav('detail','${r.id}')">View →</button></td>
    </tr>`).join('');

  return `
    <div class="page-header">
      <div><div class="ph-title">Branding Requests</div><div class="ph-sub">${reqs.length} of ${getMyRequests().length} requests</div></div>
      ${['marketplace','admin'].includes(u.role)?`<button class="btn btn-p" onclick="nav('new')">➕ New Request</button>`:''}
    </div>
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-ico">🔍</span>
        <input class="search-inp" style="width:100%;padding:9px 12px" placeholder="Search by ID, title, city…" value="${f.search}" oninput="S.filterVals.search=this.value;renderContent()"/>
      </div>
      <button class="btn btn-s btn-sm ${hasF?'btn-p':''}" onclick="S.filterOpen=!S.filterOpen;renderContent()">⚙ Filters ${hasF?'('+Object.values(f).filter(Boolean).length+')':''}</button>
      ${hasF?`<button class="btn btn-s btn-sm" onclick="S.filterVals={search:'',status:'',city:'',priority:''};renderContent()">✕ Clear</button>`:''}
    </div>
    ${S.filterOpen?`
    <div class="card" style="padding:16px 18px;margin-bottom:14px">
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px">
        <div class="fld" style="margin:0"><label>Status</label>
          <select onchange="S.filterVals.status=this.value;renderContent()">
            <option value="">All Statuses</option>${Object.entries(STATUS).map(([k,v])=>`<option value="${k}" ${f.status===k?'selected':''}>${v.label}</option>`).join('')}
          </select></div>
        <div class="fld" style="margin:0"><label>City</label>
          <input type="text" placeholder="e.g. Surat" value="${f.city}" oninput="S.filterVals.city=this.value;renderContent()"/></div>
        <div class="fld" style="margin:0"><label>Priority</label>
          <select onchange="S.filterVals.priority=this.value;renderContent()">
            <option value="">All</option>${['low','medium','high','urgent'].map(p=>`<option value="${p}" ${f.priority===p?'selected':''}>${p.charAt(0).toUpperCase()+p.slice(1)}</option>`).join('')}
          </select></div>
      </div>
    </div>`:''}
    ${rows?`<div class="tbl-wrap"><table><thead><tr><th>#</th><th>Title</th><th>Location</th><th>Type</th><th>Priority</th><th>Status</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`:
    `<div class="empty"><div style="font-size:36px;margin-bottom:10px">🔍</div><p>No requests match your filters</p></div>`}`;
}

/* ══════════════════════════ WORKFLOW ═══════════════════════════ */
function renderWorkflow(status) {
  const idx = stepIdx(status);
  return `<div class="wf">${WF_STEPS.map((s,i)=>{
    const done=idx>i, active=idx===i;
    return `<div style="display:flex;align-items:center;flex-shrink:0">
      <div class="wf-step ${done?'done':''} ${active?'active':''}">
        <div class="wf-circle">${done?'✓':i+1}</div>
        <div class="wf-lbl">${s.lbl.replace('\n','<br>')}</div>
        <div class="wf-role">${s.role}</div>
      </div>${i<WF_STEPS.length-1?`<div class="wf-line ${done?'done':''}"></div>`:''}
    </div>`;
  }).join('')}</div>`;
}

function assignRowH(label, uid, col) {
  const u=findUser(uid); if(!u) return '';
  return `<div class="assign-row"><div class="assign-ava" style="background:${col}22;color:${col}">${u.name[0]}</div>
    <div><div style="font-size:13px;font-weight:500">${u.name}</div><div style="font-size:11px;color:var(--txt3)">${label}</div></div></div>`;
}
function setDecision(d){ S.decisionChoice=d; renderContent(); }

/* ══════════════════════════ WORKFLOW ACTIONS ═══════════════════ */
function doAssignRecce(id) {
  const v=document.getElementById('sel-recce')?.value;
  if(!v){ showToast('Please select a recce member','error'); return; }
  const r=S.requests.find(x=>x.id===id), u=cu(), ru=findUser(v);
  r.status='assigned_to_recce'; r.assignedRecceId=v; r.assignedMISId=u.id;
  r.sla={...r.sla,toRecce:today()};
  r.activities.push({ action:`Assigned to Recce Team: ${ru?.name}`, byId:u.id, time:'Just now' });
  addNotif([v,r.createdById],{ title:`Assigned: ${id}`, msg:`You have been assigned for recce on "${r.title}"`, type:'assigned', reqId:id });
  showToast(`Assigned to ${ru?.name} successfully!`);
  renderSidebar(); nav('detail',id);
}

function doCompleteRecce(id) {
  const cost=document.getElementById('est-cost')?.value;
  const notes=document.getElementById('site-notes')?.value||'';
  if(!cost){ showToast('Estimated cost is required','error'); return; }
  if(!notes.trim()){ showToast('Site observations are required','error'); return; }
  const r=S.requests.find(x=>x.id===id), u=cu();
  r.status='awaiting_approval';
  r.recce={ notes, cost:parseInt(cost), condition:document.getElementById('site-cond')?.value||'Good', feasibility:document.getElementById('feasibility')?.value||'Feasible', completedAt:today() };
  r.sla={...r.sla,recceCompleted:today()};
  r.activities.push({ action:'Recce completed — submitted for approval', byId:u.id, time:'Just now' });
  const admins=USERS_DB.filter(u=>u.role==='admin').map(u=>u.id);
  addNotif([...admins, r.createdById],{ title:`Recce Done: ${id}`, msg:`Site report submitted. Est. cost ${fc(parseInt(cost))}. Awaiting approval.`, type:'recce_completed', reqId:id });
  showToast('Recce report submitted for approval!');
  renderSidebar(); nav('detail',id);
}

function doApprove(id) {
  if(!S.decisionChoice){ showToast('Please click Approve or Reject first','error'); return; }
  const r=S.requests.find(x=>x.id===id), u=cu();
  const budget=document.getElementById('final-budget')?.value;
  const comment=document.getElementById('approval-comment')?.value||'';
  r.status=S.decisionChoice;
  r.sla={...r.sla,approvalDecision:today()};
  if(S.decisionChoice==='approved'){
    r.approval={ byId:u.id, budget:parseInt(budget)||r.recce?.cost, comment:comment||'Approved.', date:today() };
    r.activities.push({ action:'Request approved by Admin', byId:u.id, time:'Just now' });
    const mis=USERS_DB.filter(u=>u.role==='mis').map(u=>u.id);
    addNotif([...mis, r.createdById],{ title:`Approved: ${id}`, msg:`Request approved. Budget: ${fc(r.approval.budget)}.`, type:'approved', reqId:id });
    showToast('Request APPROVED! ✅');
  } else {
    r.activities.push({ action:`Request rejected — ${comment||'No reason given'}`, byId:u.id, time:'Just now' });
    addNotif([r.createdById, r.assignedMISId, r.assignedRecceId].filter(Boolean),{ title:`Rejected: ${id}`, msg:`Request rejected. Reason: ${comment||'Not specified'}`, type:'rejected', reqId:id });
    showToast('Request rejected.','error');
  }
  S.decisionChoice=''; renderSidebar(); nav('detail',id);
}

function doAssignVendor(id) {
  const v=document.getElementById('sel-vendor')?.value;
  if(!v){ showToast('Please select a vendor','error'); return; }
  const r=S.requests.find(x=>x.id===id), u=cu(), vu=findUser(v);
  r.status='assigned_to_vendor'; r.assignedVendorId=v;
  r.sla={...r.sla,toVendor:today()};
  r.activities.push({ action:`Assigned to Vendor: ${vu?.vendorInfo?.company||vu?.name}`, byId:u.id, time:'Just now' });
  addNotif([v, r.createdById],{ title:`Work Order: ${id}`, msg:`Work order "${r.title}" has been assigned to you.`, type:'assigned_to_vendor', reqId:id });
  showToast(`Work order assigned to ${vu?.vendorInfo?.company||vu?.name}!`);
  renderSidebar(); nav('detail',id);
}

function doStartWork(id) {
  const r=S.requests.find(x=>x.id===id), u=cu();
  r.status='work_in_progress';
  r.activities.push({ action:'Vendor started branding work', byId:u.id, time:'Just now' });
  showToast('Work started! 🔨'); nav('detail',id);
}

function doCompleteWork(id) {
  const cost=document.getElementById('actual-cost')?.value;
  const notes=document.getElementById('vendor-notes')?.value||'Work completed as per specifications.';
  const r=S.requests.find(x=>x.id===id), u=cu();
  r.status='work_completed';
  r.vendorWork={ notes, actualCost:parseInt(cost)||r.approval?.budget, completedAt:today(), images:4 };
  r.sla={...r.sla,workCompleted:today()};
  r.activities.push({ action:'Branding work completed by vendor', byId:u.id, time:'Just now' });
  addNotif([r.createdById, r.assignedMISId].filter(Boolean),{ title:`Work Done: ${id}`, msg:`Vendor completed work for "${r.title}". 4 final photos uploaded.`, type:'work_completed', reqId:id });
  if(u.vendorInfo) u.vendorInfo.jobs=(u.vendorInfo.jobs||0)+1;
  showToast('Work completed! 🎉'); renderSidebar(); nav('detail',id);
}

function doCreateRequest() {
  const title=document.getElementById('nr-title')?.value?.trim();
  const type=document.getElementById('nr-type')?.value;
  const city=document.getElementById('nr-city')?.value?.trim();
  const addr=document.getElementById('nr-addr')?.value?.trim();
  const req2=document.getElementById('nr-req')?.value?.trim();
  if(!title||!type||!city||!addr||!req2){ showToast('Please fill all required (*) fields','error'); return; }
  const u=cu();
  const id=`BR-2024-00${String(S.newReqCtr++).padStart(2,'0')}`;
  S.requests.unshift({
    id, title, type, status:'created',
    priority:document.getElementById('nr-pri')?.value||'medium',
    city, state:document.getElementById('nr-state')?.value||'Gujarat',
    address:addr, pincode:document.getElementById('nr-pin')?.value||'',
    requirements:req2, createdById:u.id,
    assignedMISId:null, assignedRecceId:null, assignedVendorId:null,
    recce:null, approval:null, vendorWork:null, created:today(),
    activities:[{ action:'Request created', byId:u.id, time:'Just now' }],
    sla:{ created:today() }
  });
  const misTeam=USERS_DB.filter(u=>u.role==='mis'&&u.active).map(u=>u.id);
  addNotif(misTeam,{ title:`New Request: ${title}`, msg:`${u.name} submitted a new ${type} request in ${city}.`, type:'request_created', reqId:id });
  showToast(`Request ${id} submitted successfully! 🎉`);
  renderSidebar(); nav('detail',id);
}

function doAddUser() {

  const role=document.getElementById('m-role')?.value;

  const newUser = {
    id: 'u'+Date.now(), name, email, password:pass, role, phone,

function resetPassword(uid){
  const u=USERS_DB.find(x=>x.id===uid); if(!u) return;
  u.password='password123';
  closeModal();
  showToast(`Password for ${u.name} reset to "password123"`, 'info');
  renderContent();
}

function doEditUser(uid) {
  const u=USERS_DB.find(x=>x.id===uid); if(!u) return;
  const name=document.getElementById('e-name')?.value?.trim();
  const email=document.getElementById('e-email')?.value?.trim().toLowerCase();
  const phone=document.getElementById('e-phone')?.value?.trim();
  const pass=document.getElementById('e-pass')?.value?.trim();
  const role=document.getElementById('e-role')?.value;
  if(!name||!email){ showToast('Name and email are required','error'); return; }
  const dup=USERS_DB.find(x=>x.email===email&&x.id!==uid);
  if(dup){ showToast('Email already used by another user','error'); return; }
  u.name=name; u.email=email; u.phone=phone||u.phone;
  if(pass) u.password=pass;
  if(role&&u.id!==cu().id) u.role=role;
  if(u.vendorInfo){
    const company=document.getElementById('e-company')?.value?.trim();
    const rating=parseFloat(document.getElementById('e-rating')?.value);
    if(company) u.vendorInfo.company=company;
    if(!isNaN(rating)) u.vendorInfo.rating=rating;
  }
  closeModal();
  showToast(`${u.name} updated successfully!`);
  // Update current session if editing self
  if(u.id===cu().id){ S.currentUser=u; renderSidebar(); }
  renderContent();
}

function closeModal() { document.getElementById('modal-root').innerHTML=''; }

          <div><div style="font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;font-weight:700;margin-bottom:3px">Completed</div><div style="font-size:13px;font-weight:700;color:var(--grn)">${myReqs.filter(r=>r.status==='work_completed').length}</div></div>
          <div><div style="font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;font-weight:700;margin-bottom:3px">Status</div><span class="badge" style="background:var(--grnd);color:var(--grn)">✓ Active</span></div>
          ${u.vendorInfo?`<div><div style="font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;font-weight:700;margin-bottom:3px">Rating</div><div style="font-size:13px">⭐ ${u.vendorInfo.rating} / 5.0</div></div><div><div style="font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;font-weight:700;margin-bottom:3px">Completed Jobs</div><div style="font-size:13px;font-weight:700;color:var(--grn)">${u.vendorInfo.jobs}</div></div>`:''}
        </div>
      </div>
      <div class="card">
        <div class="sec">🔒 Change Password</div>
        <div class="fld"><label>Current Password</label><input id="p-cur" type="password" placeholder="Enter current password"/></div>
        <div class="fld"><label>New Password</label><input id="p-new" type="password" placeholder="Min. 6 characters"/></div>
        <div class="fld"><label>Confirm New Password</label><input id="p-conf" type="password" placeholder="Repeat new password"/></div>
        <button class="btn btn-p btn-sm" onclick="doChangePassword()">💾 Update Password</button>
      </div>
    </div>`;
}

function doChangePassword() {
  const cur=document.getElementById('p-cur')?.value;
  const nw=document.getElementById('p-new')?.value;
  const conf=document.getElementById('p-conf')?.value;
  const u=cu();
  if(!cur||!nw||!conf){ showToast('Please fill all fields','error'); return; }
  if(cur!==u.password){ showToast('Current password is incorrect','error'); return; }
  if(nw.length<6){ showToast('New password must be at least 6 characters','error'); return; }
  if(nw!==conf){ showToast('Passwords do not match','error'); return; }
  u.password=nw;
  document.getElementById('p-cur').value='';
  document.getElementById('p-new').value='';
  document.getElementById('p-conf').value='';
  showToast('Password updated successfully! ✅');
}
</script>
</body>
</html>
